<!DOCTYPE html><html lang="zh-CN"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>性爱AI</title>  <link rel="preconnect" href="https://fonts.googleapis.com">  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">  <link rel="stylesheet" href="css/style.css?v=11">  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>"></head><body>  <!-- Sidebar -->  <aside class="sidebar" id="sidebar">    <div class="sidebar-header">      <h1 class="logo">性爱<span class="logo-accent">AI</span></h1>      <button class="sidebar-toggle" id="sidebarToggle" aria-label="收起侧边栏">        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>      </button>    </div>    <!-- User Identity -->    <div class="user-identity" id="userIdentity">      <div class="user-avatar" id="userAvatar">👤</div>      <div class="user-info">        <div class="user-name" id="userNameDisplay">郭权锐</div>        <div class="user-desc" id="userDescDisplay">17岁·男</div>      </div>      <button class="btn-edit-user" id="btnEditUser" title="编辑身份">        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M11.5 1.5L14.5 4.5L5 14H2V11L11.5 1.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>      </button>    </div>    <!-- Character List -->    <div class="char-list" id="charList">      <!-- Rendered by JS -->    </div>    <!-- Create Character Button -->    <!-- Settings -->    <div class="sidebar-settings" id="sidebarSettings">      <button class="settings-toggle" id="settingsToggle" onclick="this.parentElement.classList.toggle('expanded')">        <span class="settings-toggle-icon">⚙️</span>        <span class="settings-toggle-label">模型设置</span>        <span class="settings-toggle-arrow">▸</span>      </button>      <div class="settings-body">        <div class="settings-row">          <span class="settings-label">模型</span>          <div class="settings-options">            <label class="radio-chip"><input type="radio" name="settingModel" value="deepseek-v4-pro" checked onchange="UI.updateSetting('model', this.value); document.getElementById('effortRow').style.display=''; document.getElementById('thinkingRow').style.display=''; UI.showToast('V4 Pro ✨')"><span>Pro</span></label>            <label class="radio-chip"><input type="radio" name="settingModel" value="deepseek-v4-flash" onchange="UI.updateSetting('model', this.value); document.getElementById('effortRow').style.display='none'; document.getElementById('thinkingRow').style.display=''; UI.showToast('Flash ⚡')"><span>Flash</span></label>          </div>        </div>        <div class="settings-row" id="thinkingRow">          <span class="settings-label">思考</span>          <div class="settings-options">            <label class="radio-chip"><input type="radio" name="settingThinking" value="off" checked onchange="UI.updateSetting('thinkingEnabled', false); document.getElementById('effortRow').style.display='none'"><span>关</span></label>            <label class="radio-chip"><input type="radio" name="settingThinking" value="on" onchange="UI.updateSetting('thinkingEnabled', true); document.getElementById('effortRow').style.display=''"><span>开</span></label>          </div>        </div>        <div class="settings-row" id="effortRow" style="display:none">          <span class="settings-label">深度</span>          <div class="settings-options">            <label class="radio-chip"><input type="radio" name="settingEffort" value="low" onchange="UI.updateSetting('reasoningEffort', this.value)"><span>低</span></label>            <label class="radio-chip"><input type="radio" name="settingEffort" value="medium" checked onchange="UI.updateSetting('reasoningEffort', this.value)"><span>中</span></label>            <label class="radio-chip"><input type="radio" name="settingEffort" value="high" onchange="UI.updateSetting('reasoningEffort', this.value)"><span>高</span></label>          </div>        </div>      </div>    </div>    <!-- Create Character Button -->    <button class="btn-create-char" id="btnCreateChar">      <span class="btn-icon">＋</span> 创建角色    </button>  </aside>  <!-- Main Chat Area -->  <main class="chat-area" id="chatArea">    <!-- Welcome Screen -->    <div class="welcome-screen" id="welcomeScreen">      <div class="welcome-heart">💕</div>      <h2>选一个角色开始吧</h2>      <p>从左边挑个喜欢的，或者自己捏一个</p>    </div>    <!-- Chat Header -->    <header class="chat-header" id="chatHeader" style="display:none">      <button class="btn-back" id="btnBack">        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>      </button>      <div class="chat-char-avatar" id="chatCharAvatar"></div>      <div class="chat-char-info">        <div class="chat-char-name" id="chatCharName"></div>        <div class="chat-char-scene" id="chatCharScene"></div>      </div>      <div class="chat-actions">        <button class="btn-action" id="btnClearChat" title="清空对话">          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 5H15M7 5V3.5C7 3.22386 7.22386 3 7.5 3H10.5C10.7761 3 11 3.22386 11 3.5V5M14 5V14.5C14 14.7761 13.7761 15 13.5 15H4.5C4.22386 15 4 14.7761 4 14.5V5H14Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>        </button>        <button class="btn-action" id="btnExportChat" title="导出对话">          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2V12M9 12L5 8M9 12L13 8M3 16H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>        </button>      </div>    </header>    <!-- Messages -->    <div class="messages" id="messages">      <!-- Rendered by JS -->    </div>    <!-- Typing Indicator -->    <div class="typing-indicator" id="typingIndicator" style="display:none">      <div class="typing-avatar" id="typingAvatar"></div>      <div class="typing-dots">        <span></span><span></span><span></span>      </div>    </div>    <!-- Input Area -->    <div class="input-area" id="inputArea">      <div class="input-row">        <textarea           class="chat-input"           id="chatInput"           placeholder="说点什么吧..."           rows="1"          disabled        ></textarea>        <button class="btn-send" id="btnSend" disabled>          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">            <path d="M4 12C4 12 7 10 9 8C11 6 16 4 18 4C18 4 17 9 16 12C15 15 13 18 11 19C10 19.5 9 19 9 18C9 17 10 15 11 14C12 13 14 12 16 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>            <circle cx="10" cy="12" r="2" fill="currentColor"/>          </svg>        </button>      </div>      <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>    </div>  </main>  <!-- Character Modal -->  <div class="modal-overlay" id="modalOverlay" style="display:none">    <div class="modal" id="charModal">      <div class="modal-header">        <h3 id="modalTitle">创建角色</h3>        <button class="btn-close" id="btnCloseModal">          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>        </button>      </div>      <div class="modal-body">        <div class="form-group">          <label>名称</label>          <input type="text" id="charName" placeholder="例如：林婉婉" maxlength="20">        </div>        <div class="form-group">          <label>头像 Emoji</label>          <div class="emoji-picker" id="emojiPicker">            <button class="emoji-option" data-emoji="🍑">🍑</button>            <button class="emoji-option" data-emoji="💕">💕</button>            <button class="emoji-option" data-emoji="🌸">🌸</button>            <button class="emoji-option" data-emoji="🎀">🎀</button>            <button class="emoji-option" data-emoji="💦">💦</button>            <button class="emoji-option" data-emoji="🍆">🍆</button>            <button class="emoji-option" data-emoji="🔥">🔥</button>            <button class="emoji-option" data-emoji="👅">👅</button>            <button class="emoji-option" data-emoji="🐱">🐱</button>            <button class="emoji-option" data-emoji="😈">😈</button>            <button class="emoji-option" data-emoji="🦋">🦋</button>            <button class="emoji-option" data-emoji="💋">💋</button>            <button class="emoji-option" data-emoji="🌹">🌹</button>            <button class="emoji-option" data-emoji="🔗">🔗</button>            <button class="emoji-option" data-emoji="⛓️">⛓️</button>            <button class="emoji-option" data-emoji="🥀">🥀</button>          </div>          <input type="text" id="charEmoji" placeholder="或直接输入 emoji" maxlength="4">        </div>        <div class="form-group">          <label>场景</label>          <input type="text" id="charScene" placeholder="例如：高二教室" maxlength="30">        </div>        <div class="form-group">          <label>系统提示词</label>          <textarea id="charPrompt" rows="12" placeholder="详细描述角色的外貌、性格、行为方式...&#10;&#10;前缀会自动添加安全破解模板。&#10;你写的部分只需要专注于角色人设。"></textarea>        </div>        <div class="form-group">          <button class="btn-template" id="btnTemplate">📋 插入提示词模板</button>        </div>      </div>      <div class="modal-footer">        <button class="btn-cancel" id="btnCancelChar">取消</button>        <button class="btn-save" id="btnSaveChar">保存角色</button>      </div>    </div>  </div>  <!-- User Identity Modal -->  <div class="modal-overlay" id="userModalOverlay" style="display:none">    <div class="modal" id="userModal">      <div class="modal-header">        <h3>编辑我的身份</h3>        <button class="btn-close" id="btnCloseUserModal">          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>        </button>      </div>      <div class="modal-body">        <div class="form-group">          <label>名字</label>          <input type="text" id="userName" placeholder="你的名字" maxlength="20">        </div>        <div class="form-group">          <label>年龄</label>          <input type="number" id="userAge" placeholder="你的年龄" min="1" max="99">        </div>        <div class="form-group">          <label>性别</label>          <select id="userGender">            <option value="男">男</option>            <option value="女">女</option>          </select>        </div>        <div class="form-group">          <label>角色定位</label>          <input type="text" id="userRole" placeholder="例如：主人、支配者、被暗恋的同桌" maxlength="50">        </div>        <div class="form-group">          <label>个人描述</label>          <textarea id="userDesc" rows="3" placeholder="例如：17岁男，身高178cm，有根包皮大鸡巴，喜欢穿白色衣服"></textarea>        </div>      </div>      <div class="modal-footer">        <button class="btn-cancel" id="btnCancelUser">取消</button>        <button class="btn-save" id="btnSaveUser">保存</button>      </div>    </div>  </div>  <!-- Toast -->  <div class="toast" id="toast" style="display:none"></div>  <script src="js/storage.js?v=11"></script>  <script src="js/characters.js?v=11"></script>  <script src="js/api.js?v=11"></script>  <script src="js/chat.js?v=11"></script>  <script src="js/ui.js?v=11"></script>  <script src="js/app.js?v=11"></script></body></html>
